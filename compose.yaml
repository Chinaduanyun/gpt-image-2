name: image-generation

services:
  image-generation:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Run as an explicit non-root identity. APP_UID/APP_GID must be supplied by the
    # launching shell or an uncommitted Compose .env, and must match the ownership of
    # the migrated data copy (see deploy/migrate-data-ownership.sh). No root fallback.
    user: "${APP_UID:?请显式提供 APP_UID}:${APP_GID:?请显式提供 APP_GID}"
    ports:
      - "${APP_PORT:-5577}:8787"
    # Application settings, including QUICK_BATCH_ENABLED, belong in runtime.env.
    # Do not duplicate them under environment: Compose would override env_file values.
    env_file:
      - path: runtime.env
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /data
    volumes:
      - /volume2/docker/gpt-image-2/data:/data
